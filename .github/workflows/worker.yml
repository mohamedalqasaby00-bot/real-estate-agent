name: Facebook Worker

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      CLOUD_MODE: "true"
      SUPABASE_URL: https://vhfgpmpmkctzpwxtbogi.supabase.co
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run worker
        run: npx tsx src/worker-cloud.ts
        timeout-minutes: 8
